name: Build Android APK

# 触发条件：当推送到 main 或 master 分支，或者手动触发时运行
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 获取代码
        uses: actions/checkout@v4

      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ☕ 配置 Java 环境 (Android 构建必须)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 配置 Flutter 环境 (Flet 移动端底层依赖)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🔨 编译生成 APK
        run: flet build apk

      - name: 📤 上传 APK 供下载
        uses: actions/upload-artifact@v4
        with:
          name: KeyGen-Android-App
          path: build/apk/**/*.apk
